# KOC Engine — nginx reverse proxy
# 安装: sudo cp nginx-koc-engine.conf /etc/nginx/sites-available/koc-engine
#       sudo sed -i 's/YOUR_DOMAIN/your-domain.com/' /etc/nginx/sites-available/koc-engine
#       sudo ln -sf /etc/nginx/sites-available/koc-engine /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API 反向代理 → uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10M;
    }

    # Health check
    location /api/health {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
