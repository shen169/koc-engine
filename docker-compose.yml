# ═══════════════════════════════════════════════
# KOC Engine — Docker Compose (前后端合一)
# ═══════════════════════════════════════════════
#
# Quick start:
#   1. cp backend/.env.example backend/.env  # edit keys
#   2. docker compose up -d
#   3. ./ssl-init.sh your-domain.com
#
# Management:
#   docker compose ps          # status
#   docker compose logs -f     # all logs
#   docker compose restart     # restart all
#   docker compose down        # stop all
#   docker compose up -d --build  # rebuild & restart
# ═══════════════════════════════════════════════

services:
  # ── Backend · FastAPI ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: koc-backend
    restart: always
    volumes:
      - koc_output:/output
      - ./backend/.env:/app/.env:ro
    environment:
      - OUTPUT_DIR=/output
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-}
    networks:
      - koc_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend · Next.js ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ""   # same-origin, nginx proxies /api/*
    container_name: koc-frontend
    restart: always
    networks:
      - koc_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx · Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: koc-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - koc_net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # ── Certbot · Auto-renewal cron ──
  certbot:
    image: certbot/certbot:latest
    container_name: koc-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: |
      /bin/sh -c '
      trap exit TERM;
      while :; do
        certbot renew --quiet;
        sleep 12h;
      done'
    networks:
      - koc_net

volumes:
  koc_output:
    name: koc_output       # 固定名称，不受项目目录名影响，防止重建丢数据
  certbot_www:
  certbot_certs:

networks:
  koc_net:
    driver: bridge
