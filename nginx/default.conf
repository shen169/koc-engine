# KOC Engine — nginx (HTTP → backend + frontend)
# SSL certs are managed by certbot sidecar;
# once certs exist, switch to koc-engine-ssl.conf

# 使用 Docker 内置 DNS，每 30s 重新解析，避免容器 IP 变动后 502
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Backend API ──
    location /api/ {
        set $backend_upstream "backend:8001";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10M;
    }

    # ── Frontend Next.js ──
    # Static assets (cache 1 day)
    location /_next/static/ {
        set $frontend_upstream "frontend:3000";
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    location /_next/ {
        set $frontend_upstream "frontend:3000";
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # All other requests → Next.js
    location / {
        set $frontend_upstream "frontend:3000";
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
