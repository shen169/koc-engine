services:
  # ── Backend (FastAPI) ──
  - type: web
    name: koc-engine-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_PASSWORD
        sync: false

  # ── Frontend (Next.js) ──
  - type: web
    name: koc-engine
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx next start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://koc-engine-api.onrender.com
