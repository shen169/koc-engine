services:
  # ── Backend (FastAPI) · Render Free Tier ──
  - type: web
    name: koc-engine-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_PASSWORD
        sync: false
